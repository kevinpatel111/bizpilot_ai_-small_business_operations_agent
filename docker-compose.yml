version: '3.8'

services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./database:/app/database
      - ./reports:/app/reports
    env_file:
      - .env
    depends_on:
      - mcp-server

  mcp-server:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./database:/app/database
      - ./reports:/app/reports
    env_file:
      - .env
    command: python -m fastmcp run mcp/server.py:mcp --transport http --port 8000 --host 0.0.0.0
